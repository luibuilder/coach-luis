<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach Luis</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #0c1428;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    padding: 40px 20px;
    gap: 20px;
  }

  /* 명함 */
  .card {
    width: 420px;
    height: 227px;
    background: linear-gradient(135deg, #0f1f4a 0%, #1a3068 100%);
    border-radius: 12px;
    padding: 30px 34px 26px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-shadow: 0 36px 80px rgba(0,0,0,0.55), 0 6px 20px rgba(0,0,0,0.3);
    animation: floatIn .7s cubic-bezier(.22,1,.36,1) both;
  }

  @keyframes floatIn {
    from { opacity:0; transform:translateY(20px) scale(.97); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }

  .card::before {
    content:''; position:absolute; right:-52px; top:-52px;
    width:200px; height:200px; border-radius:50%;
    border:1px solid rgba(201,168,76,0.1); pointer-events:none;
  }
  .card::after {
    content:''; position:absolute; right:-26px; top:-26px;
    width:120px; height:120px; border-radius:50%;
    border:1px solid rgba(201,168,76,0.06); pointer-events:none;
  }

  .card-top { position:relative; z-index:1; }
  .card-name {
    font-family:'DM Serif Display', serif;
    font-size:30px; color:#f5e6b8;
    letter-spacing:-0.4px; line-height:1; margin-bottom:6px;
  }
  .card-title {
    font-size:9.5px; font-weight:400;
    color:rgba(245,230,184,0.45);
    letter-spacing:2.5px; text-transform:uppercase;
  }
  .card-bottom { position:relative; z-index:1; }
  .card-tagline {
    font-size:12px; color:rgba(255,255,255,0.48);
    font-weight:300; font-style:italic; margin-bottom:13px;
  }
  .contacts { display:flex; flex-direction:column; gap:8px; }
  .contact-link {
    display:inline-flex; align-items:center; gap:9px;
    text-decoration:none; transition:all .18s; width:fit-content;
  }
  .contact-link:hover .contact-text { color:rgba(245,230,184,0.9); }
  .contact-link:hover .icon-wrap { border-color:rgba(201,168,76,0.6); }
  .icon-wrap {
    width:22px; height:22px; border-radius:50%;
    border:1px solid rgba(255,255,255,0.2);
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; transition:border-color .18s;
  }
  .icon-wrap svg {
    width:11px; height:11px;
    stroke:rgba(255,255,255,0.55); fill:none;
    stroke-width:1.5; stroke-linecap:round; stroke-linejoin:round;
  }
  .contact-text {
    font-size:11.5px; color:rgba(255,255,255,0.42);
    font-weight:300; letter-spacing:0.2px; transition:color .18s;
  }

  /* 연락처 입력 박스 */
  .input-section {
    width: 420px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 12px;
    padding: 22px 24px;
    animation: floatIn .7s .15s cubic-bezier(.22,1,.36,1) both;
  }

  .input-title {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(201,168,76,0.6);
    margin-bottom: 16px;
  }

  .field { margin-bottom: 12px; }
  .field input {
    width: 100%;
    padding: 11px 14px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color .15s;
  }
  .field input:focus { border-color: rgba(201,168,76,0.4); }
  .field input::placeholder { color: rgba(255,255,255,0.2); font-size: 13px; }

  .submit-btn {
    width: 100%;
    padding: 12px;
    background: #c9a84c;
    border: none;
    border-radius: 8px;
    color: #0f1f4a;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .15s;
    margin-top: 4px;
  }
  .submit-btn:hover { opacity: 0.85; }

  /* 토스트 */
  .toast {
    position:fixed; bottom:36px; left:50%;
    transform:translateX(-50%) translateY(10px);
    background:#c9a84c; color:#0f1f4a;
    padding:9px 20px; border-radius:4px;
    font-size:12px; font-weight:600;
    opacity:0; transition:all .25s;
    pointer-events:none; white-space:nowrap;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  @media (max-width: 460px) {
    .card, .input-section { width: 100%; }
    .card { height: auto; min-height: 200px; }
  }
</style>
</head>
<body>

<!-- 명함 -->
<div class="card">
  <div class="card-top">
    <div class="card-name">Coach Luis</div>
    <div class="card-title">AI 창업 코치</div>
  </div>
  <div class="card-bottom">
    <div class="card-tagline">사이클만 돌면 MVP가 뚝딱!</div>
    <div class="contacts">
      <a class="contact-link" href="mailto:luikim1000@gmail.com">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="1"/><polyline points="2,5 12,13 22,5"/></svg>
        </div>
        <span class="contact-text">luikim1000@gmail.com</span>
      </a>
      <a class="contact-link" href="tel:01046952379">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1-9.4 0-17-7.6-17-17 0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1L6.6 10.8z"/></svg>
        </div>
        <span class="contact-text">010-4695-2379</span>
      </a>
    </div>
  </div>
</div>

<!-- 연락처 입력 -->
<div class="input-section">
  <div class="input-title">연락처 남기기</div>
  <div class="field">
    <input type="text" id="inputName" placeholder="이름">
  </div>
  <div class="field">
    <input type="tel" id="inputPhone" placeholder="전화번호">
  </div>
  <div class="field">
    <input type="text" id="inputNote" placeholder="회사 혹은 만난 장소 (선택)">
  </div>
  <button class="submit-btn" onclick="submitContact()">전송하기</button>
</div>

<div class="toast" id="toast"></div>

<script>
  document.querySelectorAll('.contact-link').forEach(link => {
    link.addEventListener('click', () => {
      showToast(link.href.startsWith('mailto') ? 'MAIL ↗' : 'CALLING ↗');
    });
  });

  function submitContact() {
    const name = document.getElementById('inputName').value.trim();
    const phone = document.getElementById('inputPhone').value.trim();
    const note = document.getElementById('inputNote').value.trim();
    if (!name || !phone) { showToast('이름과 전화번호를 입력해주세요'); return; }
    const subject = encodeURIComponent(`[Coach Luis] ${name}님이 연락처를 남겼어요`);
    const body = encodeURIComponent(`이름: ${name}\n전화번호: ${phone}\n메모: ${note || '없음'}`);
    window.location.href = `mailto:luikim1000@gmail.com?subject=${subject}&body=${body}`;
    showToast('✓ 전송됐어요!');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
